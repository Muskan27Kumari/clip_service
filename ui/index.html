<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Person Search</title>
<style>
  :root {
    --bg0: #0a0d14;
    --bg1: #0b1020;
    --panel: rgba(20, 24, 38, 0.75);
    --panel-solid: #13182a;
    --card: rgba(23, 28, 45, 0.86);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: rgba(244, 246, 255, 0.94);
    --muted: rgba(209, 214, 238, 0.60);
    --muted2: rgba(209, 214, 238, 0.42);
    --accent: #6d6aff;
    --accent-hover: #847fff;
    --accent-2: rgba(109, 106, 255, 0.18);
    --shadow: 0 18px 60px rgba(0,0,0,0.45);
    --green: #34d399;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    background:
      radial-gradient(1400px 820px at 35% -15%, rgba(109, 106, 255, 0.28), transparent 60%),
      radial-gradient(1000px 680px at 110% 18%, rgba(31, 120, 255, 0.18), transparent 55%),
      radial-gradient(900px 700px at -10% 70%, rgba(109, 106, 255, 0.12), transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg0));
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    min-height: 100vh;
  }

  .main {
    padding: 0;
    min-height: 100vh;
  }

  .shell {
    width: 100%;
    max-width: none;
    margin: 0;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(9, 12, 20, 0.22);
    border-radius: 0;
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 100vh;
  }

  /* Header card */
  .header {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .profile-chip {
    width: 44px;
    height: 44px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.03);
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: rgba(244, 246, 255, 0.86);
    flex: 0 0 auto;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .header h1 { font-size: 22px; font-weight: 650; letter-spacing: 0.2px; }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
  }
  .header .stats {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: rgba(244, 246, 255, 0.88);
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  /* Search bar + controls */
  .search-container {
    padding: 16px 20px 6px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }

  .search-input-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.8;
  }

  .search-input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    background: rgba(10, 12, 22, 0.35);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .search-input:focus {
    border-color: rgba(109, 106, 255, 0.55);
    background: rgba(10, 12, 22, 0.55);
  }
  .search-input::placeholder { color: var(--muted2); }
  .search-btn {
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(109,106,255,1), rgba(95,92,255,1));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.2s ease, background 0.2s;
    white-space: nowrap;
  }
  .search-btn:hover { filter: brightness(1.07); }
  .search-btn:active { transform: translateY(1px); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Filters row */
  .filters {
    padding: 10px 20px 14px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
  }

  .filters-left {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 14px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .filters-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filters label { margin-right: 4px; }
  .filters select, .filters input[type="number"] {
    padding: 6px 10px;
    background: rgba(10, 12, 22, 0.35);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .filters select:focus, .filters input[type="number"]:focus {
    border-color: rgba(109, 106, 255, 0.55);
  }

  .view-toggle {
    display: inline-flex;
    gap: 8px;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.02);
  }
  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255, 255, 255, 0.03);
    color: rgba(244,246,255,0.85);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .icon-btn.active {
    background: rgba(109, 106, 255, 0.20);
    border-color: rgba(109, 106, 255, 0.35);
  }

  /* Results grid */
  .results-info {
    padding: 0 20px 12px;
    font-size: 14px;
    color: var(--muted);
  }
  .results-grid {
    padding: 0 20px 18px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .result-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    transition: border-color 0.2s, transform 0.15s ease, background 0.2s;
    overflow: hidden;
  }
  .result-card:hover {
    border-color: rgba(109, 106, 255, 0.40);
    transform: translateY(-1px);
    background: rgba(23, 28, 45, 0.95);
  }

  .rank-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 22px;
    height: 22px;
    border-radius: 7px;
    background: rgba(109, 106, 255, 0.55);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.95);
    font-size: 13px;
    font-weight: 700;
    display: grid;
    place-items: center;
    backdrop-filter: blur(8px);
  }

  .score-pill {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(109, 106, 255, 0.16);
    border: 1px solid rgba(109, 106, 255, 0.22);
    color: rgba(188, 188, 255, 0.95);
    font-size: 13px;
    font-weight: 700;
  }

  .card-body {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 12px;
    align-items: center;
    padding-top: 10px;
  }

  .thumb {
    width: 96px;
    height: 132px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    overflow: hidden;
    background: rgba(0,0,0,0.25);
    box-shadow: 0 14px 35px rgba(0,0,0,0.35);
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-title {
    font-size: 15px;
    font-weight: 650;
    color: rgba(244, 246, 255, 0.92);
    letter-spacing: 0.2px;
    margin-bottom: 6px;
  }

  .meta {
    display: grid;
    gap: 6px;
    font-size: 13.5px;
    color: rgba(209, 214, 238, 0.70);
  }
  .meta .k {
    color: rgba(209, 214, 238, 0.46);
    margin-right: 6px;
  }

  .view-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: rgba(244, 246, 255, 0.90);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.08s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .view-btn:hover {
    background: rgba(109, 106, 255, 0.16);
    border-color: rgba(109, 106, 255, 0.28);
  }
  .view-btn:active { transform: translateY(1px); }
  .view-btn.loading { opacity: 0.6; cursor: wait; }

  .pagination {
    padding: 10px 20px 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .page-btn {
    width: 34px;
    height: 34px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: rgba(244,246,255,0.88);
    cursor: pointer;
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 14px;
    transition: background 0.2s, border-color 0.2s;
  }
  .page-btn:hover { border-color: rgba(109, 106, 255, 0.35); }
  .page-btn.active {
    background: rgba(109, 106, 255, 0.25);
    border-color: rgba(109, 106, 255, 0.45);
  }
  .page-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  @media (max-width: 840px) {
    .card-body { grid-template-columns: 88px 1fr; }
    .thumb { width: 88px; height: 120px; }
  }

  /* Legacy selectors kept for modal; hide old layout */
  .card-header { display: none; }
  .card-meta { display: none; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
  }
  .modal-content .snapshot-wrapper {
    position: relative;
    display: inline-block;
  }
  .modal-content img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 8px;
    object-fit: contain;
    display: block;
  }
  .modal-content canvas {
    position: absolute;
    top: 0;
    left: 0;
    border-radius: 8px;
    pointer-events: none;
  }
  .modal-info {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .modal-close {
    position: absolute;
    top: -12px;
    right: -12px;
    width: 32px;
    height: 32px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .modal-loading {
    color: var(--muted);
    font-size: 16px;
  }

  /* Empty / Error */
  .empty-state {
    text-align: center;
    padding: 46px 20px 56px;
    color: var(--muted);
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="app">
  <main class="main">
    <div class="shell">
      <div class="header">
        <div class="profile-chip" title="Profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4.2 20.2a9.5 9.5 0 0 1 15.6 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand">
          <h1>Person Search</h1>
          <div class="subtitle">Search and explore person matches</div>
        </div>
        <div class="stats" id="stats">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4.2 20.2a9.5 9.5 0 0 1 15.6 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span id="statsText">Loading…</span>
        </div>
      </div>
      <div class="divider"></div>

      <div class="search-container">
        <div class="search-input-wrap">
          <div class="search-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M10.5 18a7.5 7.5 0 1 1 7.5-7.5A7.5 7.5 0 0 1 10.5 18Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16.3 16.3 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <input type="text" class="search-input" id="queryInput"
                 placeholder="Person wearing yellow T-shirt"
                 autofocus>
        </div>
        <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
      </div>

      <div class="filters">
        <div class="filters-left">
          <label for="topK">Results</label>
          <input type="number" id="topK" value="25" min="1" max="50" style="width:72px">
          <label for="threshold">Min score</label>
          <input type="number" id="threshold" value="0.05" min="0" max="1" step="0.01" style="width:86px">
          <label for="sortBy">Sort by</label>
          <select id="sortBy" onchange="applySortAndRender()">
            <option value="score">CLIP Score (high first)</option>
            <option value="score_low">CLIP Score (low first)</option>
            <option value="time_newest">Time (newest first)</option>
            <option value="time_oldest">Time (oldest first)</option>
          </select>
        </div>
        <div class="filters-right">
          <div class="view-toggle" aria-label="View toggle">
            <button class="icon-btn active" id="gridBtn" title="Grid view" onclick="setView('grid')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z" fill="currentColor" opacity="0.9"/>
              </svg>
            </button>
            <button class="icon-btn" id="listBtn" title="List view (coming soon)" onclick="setView('list')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="results-info" id="resultsInfo"></div>
      <div class="results-grid" id="resultsGrid"></div>
      <div class="pagination" id="pagination" style="display:none"></div>
      <div class="empty-state" id="emptyState">Enter a description to search for persons across all cameras.</div>
    </div>
  </main>
</div>

<!-- Snapshot Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-loading" id="modalLoading">Loading snapshot...</div>
    <div class="snapshot-wrapper" id="snapshotWrapper" style="display:none">
      <img id="modalImg" alt="Snapshot">
      <canvas id="bboxCanvas"></canvas>
    </div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentBlobUrl = null;
let lastQuery = '';
let lastResults = [];
let currentSorted = [];
let currentPage = 1;
const perPage = 10;
let currentView = 'grid';

// Load stats on page load
(async function loadStats() {
  try {
    const r = await fetch(`${API}/stats`);
    const d = await r.json();
    if (!r.ok) {
      const msg = typeof d.detail === 'string' ? d.detail : (d.detail ? JSON.stringify(d.detail) : r.status);
      document.getElementById('statsText').textContent = `Stats: ${msg}`;
      return;
    }
    document.getElementById('statsText').textContent =
      `${fmtInt(d.vectors_count)} persons indexed`;
  } catch(e) {
    document.getElementById('statsText').textContent = 'Qdrant offline';
  }
})();

// Enter key triggers search
document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = 'Searching...';

  const topK = parseInt(document.getElementById('topK').value) || 10;
  const threshold = parseFloat(document.getElementById('threshold').value) || 0.15;

  try {
    const resp = await fetch(`${API}/search`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query, top_k: topK, score_threshold: threshold})
    });
    const body = await resp.json();
    if (!resp.ok) {
      const msg = typeof body.detail === 'string' ? body.detail : (body.detail ? JSON.stringify(body.detail) : resp.status);
      document.getElementById('resultsInfo').textContent = msg;
      lastResults = [];
      currentSorted = [];
      currentPage = 1;
      document.getElementById('resultsGrid').innerHTML = '';
      document.getElementById('pagination').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }
    lastResults = body;
    lastQuery = query;
    currentPage = 1;
    applySortAndRender();
  } catch(e) {
    document.getElementById('resultsInfo').textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function applySortAndRender() {
  if (!lastResults.length) return;
  const sortBy = document.getElementById('sortBy').value;
  const sorted = [...lastResults];
  switch (sortBy) {
    case 'time_newest':
      sorted.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      break;
    case 'time_oldest':
      sorted.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      break;
    case 'score_low':
      sorted.sort((a, b) => a.score - b.score);
      break;
    default: // 'score' — highest CLIP similarity first (API default order)
      sorted.sort((a, b) => b.score - a.score);
      break;
  }
  currentSorted = sorted;
  renderCurrentPage();
}

function renderCurrentPage() {
  const query = lastQuery;
  const results = currentSorted;
  const start = (currentPage - 1) * perPage;
  const end = Math.min(start + perPage, results.length);
  const pageItems = results.slice(start, end);
  renderResults(pageItems, results, query);
}

function renderResults(pageItems, allResults, query) {
  const grid = document.getElementById('resultsGrid');
  const info = document.getElementById('resultsInfo');
  const empty = document.getElementById('emptyState');
  const pager = document.getElementById('pagination');

  if (!allResults.length) {
    grid.innerHTML = '';
    info.textContent = '';
    empty.textContent = `No matches found for "${query}"`;
    empty.style.display = 'block';
    pager.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  info.textContent = `Showing ${allResults.length} results for "${query}"`;

  const startIndex = (currentPage - 1) * perPage;
  grid.innerHTML = pageItems.map((r, i) => {
    const absoluteIndex = startIndex + i;
    const scorePercent = (r.score * 100).toFixed(1);
    const confPercent = (r.confidence * 100).toFixed(1);
    const { dateStr, timeStr } = fmtDateTime(r.timestamp);
    const thumbUrl = snapshotThumbUrl(r);

    return `
      <div class="result-card">
        <div class="rank-badge">${absoluteIndex + 1}</div>
        <div class="score-pill">${scorePercent}%</div>
        <div class="card-body">
          <div class="thumb">
            <img src="${thumbUrl}" alt="Snapshot thumbnail" loading="lazy" onerror="this.style.opacity=0.3; this.style.filter='grayscale(1)';">
          </div>
          <div>
            <div class="card-title">${esc(r.camera_name)}</div>
            <div class="meta">
              <div><span class="k">Tracker</span> ${esc(String(r.tracker_id))}</div>
              <div><span class="k">Confidence</span> ${confPercent}%</div>
              <div><span class="k">${dateStr}</span> ${timeStr}</div>
            </div>
          </div>
        </div>
        <button class="view-btn" onclick="viewSnapshot(${absoluteIndex})" id="viewBtn${absoluteIndex}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="2"/>
            <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2"/>
          </svg>
          View Snapshot
        </button>
      </div>`;
  }).join('');

  // Store results globally for snapshot fetching
  window._searchResults = allResults;
  renderPagination(allResults.length);
}

async function viewSnapshot(index) {
  const r = window._searchResults[index];
  const btn = document.getElementById(`viewBtn${index}`);
  if (!r || !btn) return;
  btn.classList.add('loading');
  btn.textContent = 'Loading...';

  const modal = document.getElementById('modal');
  const img = document.getElementById('modalImg');
  const wrapper = document.getElementById('snapshotWrapper');
  const canvas = document.getElementById('bboxCanvas');
  const loading = document.getElementById('modalLoading');
  const modalInfo = document.getElementById('modalInfo');

  // Show modal with loading state
  wrapper.style.display = 'none';
  loading.style.display = 'block';
  modal.classList.add('active');
  modalInfo.textContent = `${r.camera_name} | Tracker #${r.tracker_id} | ${new Date(r.timestamp).toLocaleString()}`;

  try {
    const url = `${API}/snapshot?camera=${encodeURIComponent(r.camera_name)}&sensor_id=${encodeURIComponent(r.sensor_id || '')}&timestamp=${encodeURIComponent(r.timestamp)}&quality=85`;
    const resp = await fetch(url);

    if (!resp.ok) {
      let errText = await resp.text();
      try {
        const j = JSON.parse(errText);
        if (j && typeof j.detail === 'string') errText = j.detail;
      } catch (_) { /* plain text from upstream */ }
      throw new Error(errText || `HTTP ${resp.status}`);
    }

    const blob = await resp.blob();
    currentBlobUrl = URL.createObjectURL(blob);

    img.onload = function() {
      wrapper.style.display = 'inline-block';
      loading.style.display = 'none';

      // Size canvas to match the displayed image
      const dispW = img.clientWidth;
      const dispH = img.clientHeight;
      canvas.width = dispW;
      canvas.height = dispH;

      // Draw bounding box — handle both relative (0-1) and legacy absolute coords
      const bbox = r.bbox;
      if (bbox && bbox.length === 4) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, dispW, dispH);

        // Detect format: if any value > 1.1, treat as absolute pixels on 1280x720
        const isAbsolute = bbox.some(v => v > 1.1);
        let rx1, ry1, rx2, ry2;
        if (isAbsolute) {
          rx1 = bbox[0] / 1280; ry1 = bbox[1] / 720;
          rx2 = bbox[2] / 1280; ry2 = bbox[3] / 720;
        } else {
          rx1 = bbox[0]; ry1 = bbox[1];
          rx2 = bbox[2]; ry2 = bbox[3];
        }

        const bx1 = rx1 * dispW;
        const by1 = ry1 * dispH;
        const bx2 = rx2 * dispW;
        const by2 = ry2 * dispH;

        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 3;
        ctx.strokeRect(bx1, by1, bx2 - bx1, by2 - by1);

        // Label
        const label = `#${r.tracker_id}  ${(r.score * 100).toFixed(1)}%`;
        ctx.font = 'bold 14px sans-serif';
        const textW = ctx.measureText(label).width;
        ctx.fillStyle = '#6366f1';
        ctx.fillRect(bx1, by1 - 22, textW + 10, 22);
        ctx.fillStyle = '#fff';
        ctx.fillText(label, bx1 + 5, by1 - 6);
      }
    };
    img.src = currentBlobUrl;
  } catch(e) {
    loading.textContent = `Failed to load snapshot: ${e.message}`;
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="2"/>
        <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2"/>
      </svg>
      View Snapshot
    `;
  }
}

function closeModal(event) {
  // If clicked on overlay (not content), or close button
  if (event && event.target !== document.getElementById('modal')) return;

  const modal = document.getElementById('modal');
  const img = document.getElementById('modalImg');
  const loading = document.getElementById('modalLoading');

  const wrapper = document.getElementById('snapshotWrapper');
  modal.classList.remove('active');
  wrapper.style.display = 'none';
  img.src = '';
  loading.style.display = 'block';
  loading.textContent = 'Loading snapshot...';

  // Release the blob URL to free memory
  if (currentBlobUrl) {
    URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = null;
  }
}

// Close modal on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
  }
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDateTime(ts) {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return { dateStr: '', timeStr: '' };
  const dateStr = d.toLocaleDateString('en-GB');
  const timeStr = d.toLocaleTimeString('en-GB', { hour12: false });
  return { dateStr, timeStr };
}

function fmtInt(n) {
  const x = Number(n);
  if (!isFinite(x)) return String(n ?? '');
  return Math.round(x).toLocaleString('en-US');
}

function snapshotThumbUrl(r) {
  const camera = encodeURIComponent(r.camera_name || '');
  const sensor = encodeURIComponent(r.sensor_id || '');
  const ts = encodeURIComponent(r.timestamp || '');
  return `${API}/snapshot?camera=${camera}&sensor_id=${sensor}&timestamp=${ts}&quality=55`;
}

function renderPagination(total) {
  const pager = document.getElementById('pagination');
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  if (totalPages <= 1) {
    pager.style.display = 'none';
    pager.innerHTML = '';
    return;
  }

  pager.style.display = 'flex';

  const prevDisabled = currentPage <= 1;
  const nextDisabled = currentPage >= totalPages;
  const pages = [];
  for (let p = 1; p <= totalPages; p++) pages.push(p);

  pager.innerHTML = `
    <button class="page-btn" ${prevDisabled ? 'disabled' : ''} title="Previous" onclick="gotoPage(${currentPage - 1})">
      <span aria-hidden="true">‹</span>
    </button>
    ${pages.map(p => `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="gotoPage(${p})">${p}</button>`).join('')}
    <button class="page-btn" ${nextDisabled ? 'disabled' : ''} title="Next" onclick="gotoPage(${currentPage + 1})">
      <span aria-hidden="true">›</span>
    </button>
  `;
}

function gotoPage(p) {
  const totalPages = Math.max(1, Math.ceil((currentSorted || []).length / perPage));
  currentPage = Math.min(Math.max(1, p), totalPages);
  renderCurrentPage();
}

function setView(view) {
  currentView = view;
  const gridBtn = document.getElementById('gridBtn');
  const listBtn = document.getElementById('listBtn');
  gridBtn.classList.toggle('active', currentView === 'grid');
  listBtn.classList.toggle('active', currentView === 'list');
}
</script>
